services:
  postgres:
    image: postgres:16-alpine
    container_name: pg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME:?error}
      POSTGRES_USER: ${POSTGRES_DB_USER:?error}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD:?error}
    networks:
      - observability-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWORD}@postgres:5432/${POSTGRES_DB_NAME}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - observability-net
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: app
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      garage:
        condition: service_started
      postgres:
          condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../src:/app
      - ../certs:/app/certs
      - ../secrets:/app/secrets:ro
    networks:
      - observability-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8000/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
  maildev:
    image: maildev/maildev
    container_name: maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    restart: unless-stopped
    networks:
      - observability-net
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - observability-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: rabbitmq_exporter
    restart: unless-stopped
    ports:
      - "9419:9419"
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: ${RABBITMQ_USER:-guest}
      RABBIT_PASSWORD: ${RABBITMQ_PASS:-guest}
      PUBLISH_PORT: "9419"
      OUTPUT_FORMAT: "TTY"
      LOG_LEVEL: "info"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - observability-net
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    volumes:
      - ../garage.toml:/etc/garage.toml:ro
      - ./data/meta:/var/lib/garage/meta
      - ./data/data:/var/lib/garage/data
    networks:
      - observability-net
  garage-webui:
    image: khairul169/garage-webui:1.1.0
    container_name: garage-webui
    restart: unless-stopped
    volumes:
      - ../garage.toml:/etc/garage.toml:ro
    ports:
      - "3909:3909"
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
    depends_on:
      - garage
    networks:
      - observability-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3909 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - observability-net
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - ${GF_SECURITY_ADMIN_USER:-admin}
      - ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    depends_on:
      - alloy
    networks:
      - observability-net
    volumes:
      - grafana-storage:/var/lib/grafana
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml", "-config.expand-env=true" ]
    env_file:
      - ../.env
    volumes:
      - ../monitoring/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - observability-net
    depends_on:
      - garage
  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    user: "root"
    volumes:
      - ../monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_chunks:/tmp/loki/chunks
      - loki_index:/tmp/loki/index
      - loki_rules:/tmp/loki/rules
    networks:
      - observability-net
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    user: root
    ports:
      - "9080:9080"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../monitoring/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
    environment:
      GRAFANA_LOKI_URL: http://loki:3100/loki/api/v1/push
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:9080
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - app
      - loki
      - tempo
      - prometheus
    networks:
      - observability-net
networks:
  observability-net:
    driver: bridge

volumes:
  pgdata:
  garage-data:
  garage-meta:
  rabbitmq-data:
  grafana-storage:
  loki_data:
  loki_chunks:
  loki_index:
  loki_rules:
  tempo_data:
