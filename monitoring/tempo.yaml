server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  trace_idle_period: 10s
  max_block_duration: 30m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: s3
    wal:
      path: /var/tempo/wal
    s3:
      bucket: ${TRACE_S3_BUCKET_NAME}
      region: ${S3_REGION}
      endpoint: garage:3900
      access_key: ${TRACE_S3_ACCESS_KEY}
      secret_key: ${TRACE_S3_SECRET_KEY}
      insecure: true
      forcepathstyle: true
